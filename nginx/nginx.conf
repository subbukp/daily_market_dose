server {
    listen 2001;

    # Service B — put the longer path FIRST
    location /market-mcp {
        proxy_pass http://172.17.0.1:8006;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
    }

    # Service A
    location /market {
        proxy_pass http://172.17.0.1:8005;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;
    }
}